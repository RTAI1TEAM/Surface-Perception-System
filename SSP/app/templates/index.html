<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Digital Twin Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <div class="panel control-panel">
            <h3>Robot Control</h3>
            <div class="control-content">
                <p>Status: <span id="status">Online</span></p>
            </div>
        </div>

        <div class="panel map-panel">
            <div class="map-header">
            <h3>Digital Twin Site Map</h3>
            </div>
            <div id="map" style="position:relative; width:100%; height:100%;">
    <img src="/static/images/plan_map.svg" id="mapImg" style="width:100%; height:100%; object-fit:contain; display:block;" />
    <div id="robotMarker" style="position:absolute; width:20px; height:20px; background:#00f2ff; border-radius:50%; border:2px solid white; transform:translate(-50%,-50%); box-shadow:0 0 15px #00f2ff; pointer-events:none;"></div>
</div>
        </div>

        <div class="panel alert-panel">
            <h3>Alert Log</h3>
            <ul class="log-list" id="logList">
                <li>[System] Dashboard initialized.</li>
            </ul>
        </div>

        <div class="panel sensor-panel">
            <h3>Real-time Sensor Analytics</h3>
            <div class="chart-wrapper">
                <canvas id="sensorChart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
